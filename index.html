<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidsTableTribe - La tua Tribù a Tavola</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --orange-pastel: #FFDAB9;
            --orange-dark: #FF8C42;
            --cream: #FFF9F5;
            --text-color: #5D4037;
        }

        body {
            background-color: var(--orange-pastel);
            font-family: 'Nunito', sans-serif;
            color: var(--text-color);
            padding-bottom: 50px;
        }

        h5 { font-family: 'Fredoka', sans-serif; color: var(--orange-dark); }

        .navbar {
            background-color: white !important;
            border-bottom: 4px solid var(--orange-dark);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            color: var(--orange-dark) !important;
            font-weight: 600;
            font-size: 1.5rem;
            font-family: 'Fredoka', sans-serif;
        }

        /* Styling Filtri */
        .filter-container {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 0;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        
        .filter-container::-webkit-scrollbar { display: none; } /* Nasconde scrollbar su mobile */

        .btn-filter {
            background-color: white;
            border: 2px solid var(--orange-dark);
            color: var(--orange-dark);
            border-radius: 20px;
            padding: 5px 15px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-filter.active {
            background-color: var(--orange-dark);
            color: white;
        }

        .card-locale {
            background-color: var(--cream);
            border-radius: 20px;
            margin-bottom: 20px;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .badge-kids {
            background-color: #FFE5D4;
            color: #D35400;
            margin-right: 5px;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 5px;
        }

        .btn-primary {
            background-color: var(--orange-dark);
            border: none;
            border-radius: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid justify-content-center">
        <span class="navbar-brand text-center">🧡 KidsTableTribe</span>
    </div>
</nav>

<div class="container mt-3">
    <button onclick="getLocation()" class="btn btn-outline-primary btn-location w-100 shadow-sm mb-3" style="border-radius: 20px; border-width: 2px; font-weight: bold;">
        📍 Cerca vicino a me
    </button>

    <div class="filter-container">
        <button class="btn-filter" onclick="toggleFilter(this, 'area_giochi')">🎡 Area Giochi</button>
        <button class="btn-filter" onclick="toggleFilter(this, 'fasciatoio')">👶 Fasciatoio</button>
        <button class="btn-filter" onclick="toggleFilter(this, 'menu_bimbi')">🍝 Menù Bimbi</button>
        <button class="btn-filter" onclick="toggleFilter(this, 'animazione')">🎨 Animazione</button>
    </div>

    <hr class="opacity-10">

    <div id="lista-locali" class="row">
        </div>
</div>

<script src="script.js"></script>
</body>
</html>
