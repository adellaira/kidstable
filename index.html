<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="KidsTable">
    <meta name="format-detection" content="telephone=no, address=no, email=no">
    
    <title>KidsTable</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF8C42">
    <link rel="apple-touch-icon" href="KidsTable.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    
<div id="pwa-install-banner" class="pwa-banner d-none">
    <div class="d-flex align-items-center justify-content-between p-3">
        <div class="d-flex align-items-center">
            <img src="KidsTable.png" width="40" height="40" class="rounded-2 me-3 shadow-sm">
            <div>
                <p class="mb-0 fw-bold small">Installa KidsTable</p>
                <p class="mb-0 x-small text-muted" id="pwa-instruction">Aggiungi alla home per usarla come un'app</p>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button id="btn-pwa-install" class="btn btn-sm btn-warning fw-bold rounded-pill px-3">Installa</button>
            <button onclick="closePwaBanner()" class="btn-close small"></button>
        </div>
    </div>
</div>
    
    <nav class="navbar sticky-top bg-white shadow-sm">
        <div class="container-fluid justify-content-center">
            <a class="navbar-brand py-1" href="#">
                <img src="KidsTable.png" alt="KidsTable Logo" id="main-logo">
            </a>
        </div>
    </nav>

    <div class="container mt-3">
        
        <button onclick="getLocation()" class="btn btn-location w-100 shadow-sm mb-3">
            📍 Cerca vicino a me
        </button>

        <div class="filter-container">
            <button class="btn-filter" onclick="toggleFilter(this, 'area_giochi_interna')">🏠 Giochi Interni</button>
            <button class="btn-filter" onclick="toggleFilter(this, 'area_giochi_esterna')">🌳 Giochi Esterni</button>
            <button class="btn-filter" onclick="toggleFilter(this, 'fasciatoio')">👶 Fasciatoio</button>
            <button class="btn-filter" onclick="toggleFilter(this, 'tovagliette_da_colorare')">🖍️ Tovagliette</button>
            <button class="btn-filter" onclick="toggleFilter(this, 'menu_bimbi')">🍝 Menù Bimbi</button>
        </div>

        <div id="counter-container" class="mt-3 mb-2 d-none text-center">
            <p class="counter-text">
                🌟 <span id="n-locali">0</span> locali trovati entro 10 km
            </p>
        </div>

        <hr class="my-3 opacity-10">

        <div id="lista-locali" class="row">
            <div class="col-12 text-center p-5">
                <div class="spinner-border text-warning" role="status"></div>
                <p class="mt-2 text-muted">Caricamento...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDettagli" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0" style="border-radius: 25px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalNomeLocale"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h6 class="fw-bold text-muted small text-uppercase mb-3">📸 Foto dell'area bimbi</h6>
                    
                    <div class="d-flex overflow-x-auto gap-2 py-2 no-scrollbar">
                        <div class="item-gallery">
                            <img id="imgGiochiInterna" src="" class="img-fluid rounded-4 shadow-sm" onerror="this.src='img/no-photo.jpg'">
                            <p class="small text-center mt-2 fw-bold">Giochi Interni</p>
                        </div>
                        <div class="item-gallery">
                            <img id="imgGiochiEsterna" src="" class="img-fluid rounded-4 shadow-sm" onerror="this.src='img/no-photo.jpg'">
                            <p class="small text-center mt-2 fw-bold">Giochi Esterni</p>
                        </div>
                        <div class="item-gallery">
                            <img id="imgBagno" src="" class="img-fluid rounded-4 shadow-sm" onerror="this.src='img/no-photo.jpg'">
                            <p class="small text-center mt-2 fw-bold">Fasciatoio</p>
                        </div>
                        <div class="item-gallery">
                            <img id="imgKit" src="" class="img-fluid rounded-4 shadow-sm" onerror="this.src='img/no-photo.jpg'">
                            <p class="small text-center mt-2 fw-bold">Tovaglietta</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <p class="text-muted small italic text-center">Le foto sono fornite dal locale</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=1.03')
                    .then(reg => console.log('KidsTable PWA: Registrata con successo'))
                    .catch(err => console.log('Errore registrazione PWA:', err));
            });
        }
    </script>

</body>
</html>
