<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidsTable - La tua Tribù a Tavola</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

<nav class="navbar sticky-top bg-white shadow-sm">
    <div class="container-fluid justify-content-center">
        <a class="navbar-brand py-1" href="#">
            <img src="KidsTable.png" alt="KidsTable Logo" id="main-logo">
        </a>
    </div>
</nav>

<div class="container mt-3">
    <button onclick="getLocation()" class="btn btn-location w-100 shadow-sm mb-3">
        📍 Cerca vicino a me
    </button>

    <div class="filter-container">
        <button class="btn-filter" onclick="toggleFilter(this, 'area_giochi')">🎡 Area Giochi</button>
        <button class="btn-filter" onclick="toggleFilter(this, 'fasciatoio')">👶 Fasciatoio</button>
        <button class="btn-filter" onclick="toggleFilter(this, 'menu_bimbi')">🍝 Menù Bimbi</button>
        <button class="btn-filter" onclick="toggleFilter(this, 'animazione')">🎨 Animazione</button>
    </div>

    <div id="counter-container" class="mt-3 mb-2 d-none text-center">
        <p class="counter-text">
            🌟 <span id="n-locali">0</span> locali trovati <span id="dist-label">vicino a te</span>
        </p>
    </div>

    <hr class="my-3 opacity-10">

    <div id="lista-locali" class="row">
        </div>
</div>

<script src="script.js"></script>

</body>
</html>
