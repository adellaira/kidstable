<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidsTableTribe - La tua Tribù a Tavola</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --orange-pastel: #FFDAB9; /* Pesca/Arancio chiaro */
            --orange-dark: #FF8C42;   /* Arancio vivace per bottoni */
            --cream: #FFF9F5;         /* Sfondo card */
            --text-color: #5D4037;    /* Marrone scuro per leggibilità */
        }

        body {
            background-color: var(--orange-pastel);
            font-family: 'Nunito', sans-serif;
            color: var(--text-color);
        }

        h1, h5 {
            font-family: 'Fredoka', sans-serif;
            color: var(--orange-dark);
        }

        .navbar {
            background-color: white !important;
            border-bottom: 4px solid var(--orange-dark);
        }

        .navbar-brand {
            color: var(--orange-dark) !important;
            font-weight: 600;
            font-size: 1.5rem;
        }

        .btn-primary {
            background-color: var(--orange-dark);
            border: none;
            border-radius: 25px;
            font-weight: bold;
            padding: 10px 20px;
        }

        .btn-primary:hover {
            background-color: #e6762d;
        }

        .btn-outline-primary {
            color: var(--orange-dark);
            border-color: var(--orange-dark);
            border-radius: 25px;
            background: white;
        }

        .card-locale {
            background-color: var(--cream);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 140, 66, 0.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .card-locale:active {
            transform: scale(0.98);
        }

        .badge-kids {
            background-color: #FFE5D4;
            color: #D35400;
            margin-right: 5px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 5px;
        }

        .icon-header {
            font-size: 1.2rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container-fluid justify-content-center">
        <span class="navbar-brand">🧡 KidsTableTribe</span>
    </div>
</nav>

<div class="container mt-4">
    <div class="text-center mb-4">
        <p class="lead">Trova il posto perfetto per la tua famiglia 🍼</p>
        <button onclick="getLocation()" class="btn btn-outline-primary w-100 shadow-sm">
            📍 Cerca vicino a me
        </button>
    </div>
    
    <div id="lista-locali" class="row">
        </div>
</div>

<script>
    const csvUrl = 'locali.csv';

    function loadLocals() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                if(results.data.length > 0) {
                    renderLocali(results.data);
                } else {
                    showError("Il file CSV sembra vuoto.");
                }
            },
            error: function() {
                showError("Caricamento in corso... assicurati che locali.csv sia su GitHub!");
            }
        });
    }

    function renderLocali(data) {
        let html = '';
        data.forEach(locale => {
            if(!locale.nome) return;
            html += `
                <div class="col-12 col-md-6">
                    <div class="card card-locale p-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="mb-1">${locale.nome}</h5>
                        </div>
                        <p class="text-muted small mb-3">${locale.indirizzo}</p>
                        <div class="mb-3">
                            ${locale.area_giochi === 'Sì' ? '<span class="badge-kids">🎡 Area Giochi</span>' : ''}
                            ${locale.fasciatoio === 'Sì' ? '<span class="badge-kids">👶 Fasciatoio</span>' : ''}
                            ${locale.menu_bimbi === 'Sì' ? '<span class="badge-kids">🍝 Menù Bimbi</span>' : ''}
                            ${locale.animazione === 'Sì' ? '<span class="badge-kids">🎨 Animazione</span>' : ''}
                        </div>
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(locale.nome + ' ' + locale.indirizzo)}" 
                           target="_blank" 
                           class="btn btn-primary w-100">
                           Vedi sulla Mappa
                        </a>
                    </div>
                </div>
            `;
        });
        document.getElementById('lista-locali').innerHTML = html;
    }

    function showError(msg) {
        document.getElementById('lista-locali').innerHTML = `
            <div class="text-center p-5">
                <p>${msg}</p>
            </div>
        `;
    }

    function getLocation() {
        if (navigator.geolocation) {
            alert("Ricerca locali vicini attivata! (Logica di ordinamento in arrivo)");
        }
    }

    window.onload = loadLocals;
</script>

</body>
</html>
