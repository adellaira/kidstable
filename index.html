<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidsTableTribe - Trova il posto perfetto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .card-locale { border-radius: 15px; margin-bottom: 15px; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .badge-kids { background-color: #ffcc00; color: #000; margin-right: 5px; }
        #map { height: 200px; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container-fluid justify-content-center">
        <span class="navbar-brand mb-0 h1">🍼 KidsTableTribe</span>
    </div>
</nav>

<div class="container mt-3">
    <button onclick="getLocation()" class="btn btn-outline-primary w-100 mb-3">📍 Trova locali vicino a me</button>
    
    <div id="lista-locali">
        <p class="text-center text-muted">Caricamento locali in corso...</p>
    </div>
</div>

<script>
    const csvUrl = 'locali.csv';

    function loadLocals() {
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                renderLocali(results.data);
            }
        });
    }

    function renderLocali(data) {
        let html = '';
        data.forEach(locale => {
            if(!locale.nome) return;
            html += `
                <div class="card card-locale p-3">
                    <h5 class="fw-bold">${locale.nome}</h5>
                    <p class="text-muted small">${locale.indirizzo}</p>
                    <div>
                        ${locale.area_giochi === 'Sì' ? '<span class="badge badge-kids">🎡 Area Giochi</span>' : ''}
                        ${locale.fasciatoio === 'Sì' ? '<span class="badge badge-kids">👶 Fasciatoio</span>' : ''}
                        ${locale.menu_bimbi === 'Sì' ? '<span class="badge badge-kids">🍝 Menù Bimbi</span>' : ''}
                    </div>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(locale.indirizzo)}" class="btn btn-sm btn-primary mt-3">Raggiungi</a>
                </div>
            `;
        });
        document.getElementById('lista-locali').innerHTML = html;
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                console.log("Posizione ottenuta:", position.coords.latitude, position.coords.longitude);
                // Qui potresti aggiungere la logica per ordinare il CSV per distanza
            });
        }
    }

    window.onload = loadLocals;
</script>
</body>
</html>
